services:
  mongo:
    image: mongo:7
    container_name: mongodb-eva-pulse
    restart: unless-stopped
    # Escucha en todas las interfaces para Compass/interno. En AWS restringe SG 27017 a tu IP.
    ports:
      - "0.0.0.0:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - eva_pulse_mongo_data:/data/db

volumes:
  eva_pulse_mongo_data:
